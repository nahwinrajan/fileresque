name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2

      - name: cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: cargo fmt check
        run: cargo fmt --all -- --check

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: bun install
        run: bun install --frozen-lockfile

      - name: biome ci
        run: bun biome ci .

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: cargo test
        run: cargo test --workspace

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: bun install
        run: bun install --frozen-lockfile

      - name: vitest
        run: bun vitest run

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: cargo coverage
        run: cargo llvm-cov --workspace --lcov --output-path lcov.info --fail-under-lines 80

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: bun install
        run: bun install --frozen-lockfile

      - name: vitest coverage
        run: bun vitest run --coverage
        # Frontend coverage threshold enforced in vite.config.ts (70%)

      - name: Upload Rust coverage
        uses: codecov/codecov-action@v5
        with:
          files: lcov.info
          fail_ci_if_error: false

  security:
    name: Security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      # Advisories (RustSec CVEs / unmaintained / yanked) + license + source
      # policy, all driven by deny.toml. Fails on any high/critical advisory.
      - name: Install cargo-deny
        uses: taiki-e/install-action@cargo-deny

      - name: cargo deny check
        run: cargo deny check

      # Redundant with `deny check advisories` but listed explicitly in P5-T05;
      # provides a second, independently-maintained CVE view.
      - name: Install cargo-audit
        uses: taiki-e/install-action@cargo-audit

      - name: cargo audit
        run: cargo audit --deny warnings

  build-mac:
    name: Build (macOS)
    runs-on: macos-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: bun install
        run: bun install --frozen-lockfile

      - name: svelte-kit sync
        run: bun run check
        continue-on-error: true
        # svelte-kit sync may warn about missing .svelte-kit on a clean checkout; not fatal

      - name: cargo build (macOS)
        run: cargo build --workspace

  build-win:
    name: Build (Windows)
    runs-on: windows-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: bun install
        run: bun install --frozen-lockfile

      - name: svelte-kit sync
        run: bun run check
        continue-on-error: true
        # svelte-kit sync may warn about missing .svelte-kit on a clean checkout; not fatal

      - name: cargo build (Windows)
        run: cargo build --workspace
